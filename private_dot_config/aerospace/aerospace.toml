config-version = 2

# ── Startup ──────────────────────────────────────────────────────────────────
after-startup-command = [
    'exec-and-forget sketchybar',
    'exec-and-forget borders active_color="glow(0xff00ffaa)" inactive_color=0xff313244 width=6.0',
]

start-at-login = true
automatically-unhide-macos-hidden-apps = true

# ── Layout defaults ───────────────────────────────────────────────────────────
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ── Tree normalizations ───────────────────────────────────────────────────────
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ── Mouse follows focus ───────────────────────────────────────────────────────
on-focused-monitor-changed = []
on-focus-changed = []

# ── Sketchybar integration ────────────────────────────────────────────────────
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# ── Key mapping ───────────────────────────────────────────────────────────────
[key-mapping]
    preset = 'qwerty'

# ── Gaps (Hyprland-style breathing room) ─────────────────────────────────────
[gaps]
    inner.horizontal = 8
    inner.vertical   = 8
    outer.left       = 8
    outer.bottom     = 8
    outer.top        = [{monitor.'built-in' = 16}, 48]
    outer.right      = 8

# ── Window rules ──────────────────────────────────────────────────────────────
[[on-window-detected]]
    if.app-id = 'com.apple.systempreferences'
    run = 'layout floating'

[[on-window-detected]]
    if.app-id = 'com.apple.calculator'
    run = 'layout floating'

# ── Main keybindings ──────────────────────────────────────────────────────────
[mode.main.binding]
    # Focus (vim-style)
    cmd-left = 'focus left'
    cmd-down = 'focus down'
    cmd-up = 'focus up'
    cmd-right = 'focus right'

    # Move windows (vim-style)
    cmd-shift-h = 'move left'
    cmd-shift-j = 'move down'
    cmd-shift-k = 'move up'
    cmd-shift-l = 'move right'

    # Resize
    cmd-minus = 'resize smart -50'
    cmd-equal = 'resize smart +50'

    # Layout toggles
    cmd-slash       = 'layout tiles horizontal vertical'
    cmd-comma       = 'layout accordion horizontal vertical'
    cmd-shift-space = 'layout floating tiling'
    # cmd-f           = 'macos-native-fullscreen'

    # Workspace switching (number-based)
    cmd-1 = 'workspace 1'
    cmd-2 = 'workspace 2'
    cmd-3 = 'workspace 3'
    cmd-4 = 'workspace 4'
    cmd-5 = 'workspace 5'
    cmd-6 = 'workspace 6'
    cmd-7 = 'workspace 7'
    cmd-8 = 'workspace 8'
    cmd-9 = 'workspace 9'

    # Move window to workspace
    cmd-shift-1 = 'move-node-to-workspace 1'
    cmd-shift-2 = 'move-node-to-workspace 2'
    cmd-shift-3 = 'move-node-to-workspace 3'
    cmd-shift-4 = 'move-node-to-workspace 4'
    cmd-shift-5 = 'move-node-to-workspace 5'
    cmd-shift-6 = 'move-node-to-workspace 6'
    cmd-shift-7 = 'move-node-to-workspace 7'
    cmd-shift-8 = 'move-node-to-workspace 8'
    cmd-shift-9 = 'move-node-to-workspace 9'

    # Workspace navigation
    cmd-tab       = 'workspace-back-and-forth'
    cmd-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Window management
    cmd-q     = 'close'
    cmd-enter = 'exec-and-forget osascript -e "tell application \"Ghostty\" to new window"'

    # Mode switching
    cmd-shift-semicolon = 'mode service'
    cmd-r               = 'mode resize'

    # Disable accidental macOS app hide shortcuts
    cmd-h     = []
    cmd-alt-h = []

# ── Service mode ──────────────────────────────────────────────────────────────
[mode.service.binding]
    esc       = ['reload-config', 'mode main']
    r         = ['flatten-workspace-tree', 'mode main']
    f         = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    # Join windows into a container
    cmd-shift-h = ['join-with left',  'mode main']
    cmd-shift-j = ['join-with down',  'mode main']
    cmd-shift-k = ['join-with up',    'mode main']
    cmd-shift-l = ['join-with right', 'mode main']

# ── Resize mode ───────────────────────────────────────────────────────────────
[mode.resize.binding]
    h     = 'resize width -50'
    j     = 'resize height +50'
    k     = 'resize height -50'
    l     = 'resize width +50'
    minus = 'resize smart -50'
    equal = 'resize smart +50'
    enter = 'mode main'
    esc   = 'mode main'
